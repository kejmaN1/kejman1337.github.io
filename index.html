<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <title>Kejman1337 | Profile</title>
    <style>
        body { 
            background-image: url('pobierz.gif'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* EFEKT PRZEZROCZYSTOŚCI (GLASSMORPHISM) */
        .container { 
            background: rgba(26, 26, 26, 0.6); /* Przezroczyste tło (60%) */
            backdrop-filter: blur(10px); /* Rozmycie GIFa pod boksem */
            -webkit-backdrop-filter: blur(10px); /* Wsparcie dla Safari */
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(246, 255, 0, 0.2); /* Delikatna żółta obwódka */
            text-align: center; 
            width: 320px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }

        .profile-img {
            width: 190px; 
            height: 190px; 
            border-radius: 50%; 
            border: 2px solid #f6ff00; 
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(246, 255, 0, 0.3); /* Lekka poświata wokół zdjęcia */
        }

        h1 { color: #f6ff00; font-size: 24px; margin-bottom: 5px; }
        h2 { color: #f6ff00; font-size: 20px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(246, 255, 0, 0.3); padding-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        .links { display: flex; flex-direction: column; gap: 15px; }
        .links a { 
            background: rgba(37, 37, 37, 0.7); /* Przezroczyste przyciski */
            color: white; 
            text-decoration: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.3s; 
            border: 1px solid rgba(68, 68, 68, 0.5); 
        }
        .links a:hover { background: #f6ff00; color: #000; transform: scale(1.05); }

        .specs-list { 
            text-align: left; 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }
        .specs-list li { 
            margin-bottom: 12px; 
            font-size: 14px; 
            color: #ccc; 
            border-bottom: 1px solid rgba(246, 255, 0, 0.1);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .specs-list li span { 
            color: #f6ff00; 
            font-weight: bold; 
            text-align: right;
            padding-left: 10px;
        }
    </style>
</head>
